var randomMonArr = [];

var i;
for (i=0; i<6; i++) {
  randomItem = Math.floor(Math.random() * pokemon.length);
  document.getElementById("img" + i).src = "https://play.pokemonshowdown.com/sprites/gen2/" + pokemon[randomItem].toLowerCase() + ".png"
  randomMonArr.push(pokemon[randomItem]);
  pokemon.splice([randomItem], 1);
}

let voices, utterance;
const synth = window.speechSynthesis;

function speakVoice() {
voices = this.getVoices();
second.voice = voices[139];
third.voice = voices[81];
fourth.voice = voices[148];
fifth.voice = voices[111];
sixth.voice = voices[140];
seventh.voice = voices[82];
speechSynthesis.speak(utterance);
};

speechSynthesis.addEventListener('voiceschanged', speakVoice);
  
const first = new SpeechSynthesisUtterance(" ");
const second = new SpeechSynthesisUtterance(randomMonArr[0]);
const third = new SpeechSynthesisUtterance(randomMonArr[1]);
const fourth = new SpeechSynthesisUtterance(randomMonArr[2]);
const fifth = new SpeechSynthesisUtterance(randomMonArr[3]);

const seventh = new SpeechSynthesisUtterance("and " + randomMonArr[5]);

};
