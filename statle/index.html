<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Greg Region Statle</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/SheePop-dev/SheePop-dev.github.io/refs/heads/main/cards/favicon256.png" />
    <meta name="twitter:title" content="Greg Statle">
    <meta name="twitter:description" content="They're calling it the Gregest Statle of all time">
    <meta name="twitter:image" content="images/Centiego.png">
  </head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      transition-duration: 0.2s;
      font-family: Arial;
      text-align: center;
      width: 300px;
      margin: auto;
    }

    .switch {
      position: absolute;
      display: inline-block;
      right: 12px;
      width: 60px;
      height: 34px;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      -webkit-transition: .4s;
      transition: .4s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 26px;
      width: 26px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      -webkit-transition: .4s;
      transition: .4s;
    }

    input:checked+.slider {
      background-color: #e6ba0c;
    }

    input:focus+.slider {
      box-shadow: 0 0 1px #e6ba0c;
    }

    input:checked+.slider:before {
      -webkit-transform: translateX(26px);
      -ms-transform: translateX(26px);
      transform: translateX(26px);
    }

    .slider.round {
      border-radius: 34px;
    }

    .slider.round:before {
      border-radius: 50%;
    }

    button {
      margin: 5px;
      margin-left: 24px;
      padding: 10px;
      width: 80%;
      position: relative;
    }

    img {
      height: 150px;
    }

    #pokemonName {
      font-size: 20px;
    }

    #newGame {
      display: none;
      margin-left: 5px;
    }

    .xStat {
      width: 24px;
      margin-top: 12px;
      float: right;
      opacity: 0;
      transition-duration: 0.5s;
    }

    table {
      table-layout: fixed;
      width: 300px;
      border-collapse: collapse;
      margin: 0px auto;
      margin-left: -24px;
    }

    td {
      width: 100px;
      height: 75px;
      padding: 8px;
      border: 1px solid #ccc;
      overflow: hidden;
      text-align: center;
      vertical-align: middle;
    }

    table img {
      max-width: 100%;
      max-height: 100%;
      display: block;
      margin: auto;
    }

    #scene1 {
      display: none;
    }
  </style>
  <body>
    <label class="switch">
      <input onclick="darkTheme()" type="checkbox">
      <span class="slider round"></span>
    </label>
    <h3>Greg Region Statle</h1>
    <span id="scene0">
      <p id="pokemonName">Loading...</p>
      <img id="pokemonSprite" src="" alt="Pokemon" />
      <div id="buttons">
        <button onclick="submit(0)" id="btn0">HP</button>
        <span class="xStat" id="xhp"></span>
        <br>
        <button onclick="submit(1)" id="btn1">Attack</button>
        <span class="xStat" id="xatk"></span>
        <br>
        <button onclick="submit(2)" id="btn2">Defense</button>
        <span class="xStat" id="xdef"></span>
        <br>
        <button onclick="submit(3)" id="btn3">Special Attack</button>
        <span class="xStat" id="xspa"></span>
        <br>
        <button onclick="submit(4)" id="btn4">Special Defense</button>
        <span class="xStat" id="xspd"></span>
        <br>
        <button onclick="submit(5)" id="btn5">Speed</button>
        <span class="xStat" id="xspe"></span>
      </div>
      <br>
      <hr>
      <p id="result">Total BST: 0</p>
    </span>
    <span id="scene1">
      <button id="newGame" onclick="newGame()">New Game</button>
      <br>
      <br>
      <div id="yourScore">
        <span id="finalScore">a </span>
        <table>
          <td id="your0"></td>
          <td id="your1"></td>
          <td id="your2"></td>
          <tr>
            <td id="your3"></td>
            <td id="your4"></td>
            <td id="your5"></td>
        </table>
      </div>
      <br>
      <br>
      <div id="bestScore"> Best possible score: <table>
          <td id="best0"></td>
          <td id="best1"></td>
          <td id="best2"></td>
          <tr>
            <td id="best3"></td>
            <td id="best4"></td>
            <td id="best5"></td>
        </table>
      </div>
    </span>
<script>
class mon {
    constructor(name, stats, shiny) {
        this.name = name;
        this.stats = stats;
        this.shiny = shiny;
    }
}

const monList = [
    new mon("Banvil", {
        hp: 65,
        attack: 40,
        defense: 65,
        specialAttack: 25,
        specialDefense: 25,
        speed: 65
    }, true),
    new mon("Farraith", {
        hp: 121,
        attack: 154,
        defense: 151,
        specialAttack: 49,
        specialDefense: 62,
        speed: 33
    }, true),
    new mon("Centiego", {
        hp: 30,
        attack: 20,
        defense: 30,
        specialAttack: 50,
        specialDefense: 20,
        speed: 50
    }, true),
    new mon("Scoligon", {
        hp: 65,
        attack: 60,
        defense: 60,
        specialAttack: 120,
        specialDefense: 90,
        speed: 95
    }, true),
    new mon("Staticrab", {
        hp: 50,
        attack: 35,
        defense: 45,
        specialAttack: 65,
        specialDefense: 70,
        speed: 65
    }, true),
    new mon("Voltacean", {
        hp: 105,
        attack: 55,
        defense: 75,
        specialAttack: 90,
        specialDefense: 110,
        speed: 115
    }, true),
    new mon("Quaggledink", {
        hp: 75,
        attack: 65,
        defense: 55,
        specialAttack: 90,
        specialDefense: 50,
        speed: 85
    }, true),
	new mon("Stalactyke", {
        hp: 60,
        attack: 65,
        defense: 55,
        specialAttack: 65,
        specialDefense: 55,
        speed: 60
    }, true),
	new mon("Stalagmight", {
        hp: 110,
        attack: 130,
        defense: 120,
        specialAttack: 60,
        specialDefense: 50,
        speed: 50
    }, true),
	new mon("Stalagma", {
        hp: 110,
        attack: 60,
        defense: 50,
        specialAttack: 130,
        specialDefense: 120,
        speed: 50
    }, true),
    new mon("Mega Quaggledink", {
        hp: 75,
        attack: 30,
        defense: 80,
        specialAttack: 160,
        specialDefense: 80,
        speed: 95
    }, true),
    new mon("Mega Ludicolo", {
        hp: 80,
        attack: 55,
        defense: 70,
        specialAttack: 150,
        specialDefense: 100,
        speed: 125
    }, false),
    new mon("Mega Dusknoir", {
        hp: 45,
        attack: 180,
        defense: 160,
        specialAttack: 65,
        specialDefense: 130,
        speed: 45
    }, false),
    new mon("Litwick", {
        hp: 50,
        attack: 30,
        defense: 55,
        specialAttack: 65,
        specialDefense: 55,
        speed: 20
    }, false), 
    new mon("Lampent", {
        hp: 60,
        attack: 40,
        defense: 60,
        specialAttack: 95,
        specialDefense: 60,
        speed: 55
    }, false), 
    new mon("Chandelure", {
        hp: 60,
        attack: 55,
        defense: 90,
        specialAttack: 145,
        specialDefense: 90,
        speed: 85
    }, false),
    new mon("Satyram", {
        hp: 120,
        attack: 80,
        defense: 67,
        specialAttack: 80,
        specialDefense: 67,
        speed: 67
    }, true),
	new mon("Jerbohm", {
        hp: 80,
        attack: 60,
        defense: 65,
        specialAttack: 90, 
        specialDefense: 85,
        speed: 90
    }, true),
	new mon("Storlopho", {
        hp: 60,
        attack: 55,
        defense: 45,
        specialAttack: 125, 
        specialDefense: 105,
        speed: 130
    }, true),
	new mon("Mega Storlopho", {
        hp: 60,
        attack: 60,
        defense: 50,
        specialAttack: 175, 
        specialDefense: 135,
        speed: 140
    }, true),
	new mon("Drount", {
        hp: 50,
        attack: 60,
        defense: 55,
        specialAttack: 80, 
        specialDefense: 65,
        speed: 65
    }, true),
	new mon("Aquoral", {
        hp: 90,
        attack: 60,
        defense: 45,
        specialAttack: 110, 
        specialDefense: 80,
        speed: 95
    }, true),
	new mon("Sqairrel", {
        hp: 35,
        attack: 40,
        defense: 35,
        specialAttack: 40, 
        specialDefense: 30,
        speed: 30
    }, true),
	new mon("Glident", {
        hp: 75,
        attack: 73,
        defense: 65,
        specialAttack: 73, 
        specialDefense: 55,
        speed: 100
    }, true),
];

const shinyOdds = 128;
var isShiny = false;
var shuffledArr = [...monList].sort(() => Math.random() - 0.5);
var currentMon = 0;
var totalBST = 0;
var dark = false;
var a;

function darkTheme() {
    if (dark) {
        document.body.style.backgroundColor = "white";
        document.body.style.color = "black";
        dark = false;
    } else {
        document.body.style.backgroundColor = "black";
        document.body.style.color = "white";
        dark = true;
    }
}

const statKeys = [
    "hp",
    "attack",
    "defense",
    "specialAttack",
    "specialDefense",
    "speed"
];

const statLabels = {
    hp: "HP",
    attack: "Attack",
    defense: "Defense",
    specialAttack: "Special Attack",
    specialDefense: "Special Defense",
    speed: "Speed"
};

function calculateBestScore(team) {
    let bestScore = 0;
    let bestAssignment = [];
    function solve(index, usedStats, currentScore, assignment) {
        if (index === team.length) {
            if (currentScore > bestScore) {
                bestScore = currentScore;
                bestAssignment = [...assignment];
            }
            return;
        }
        const mon = team[index];
        for (const stat of statKeys) {
            if (usedStats.has(stat)) continue;
            usedStats.add(stat);
            assignment.push({
                pokemon: mon,
                stat: stat,
                value: mon.stats[stat]
            });
            solve(
                index + 1,
                usedStats,
                currentScore + mon.stats[stat],
                assignment
            );
            assignment.pop();
            usedStats.delete(stat);
        }
    }
    solve(0, new Set(), 0, []);
    return {
        score: bestScore,
        assignment: bestAssignment
    };
}

function newGame() {
    document.getElementById("scene0").style.display = "inline";
    document.getElementById("scene1").style.display = "none";
    document.getElementById("xhp").style.opacity = "0";
    document.getElementById("xatk").style.opacity = "0";
    document.getElementById("xdef").style.opacity = "0";
    document.getElementById("xspa").style.opacity = "0";
    document.getElementById("xspd").style.opacity = "0";
    document.getElementById("xspe").style.opacity = "0";
    document.getElementById("newGame").style.display = "none";
    shuffledArr = [...monList].sort(() => Math.random() - 0.5);
    currentMon = 0;
    totalBST = 0;
    document.getElementById("btn0").disabled = false;
    document.getElementById("btn0").innerHTML = "HP";
    document.getElementById("btn1").disabled = false;
    document.getElementById("btn1").innerHTML = "Attack";
    document.getElementById("btn2").disabled = false;
    document.getElementById("btn2").innerHTML = "Defense";
    document.getElementById("btn3").disabled = false;
    document.getElementById("btn3").innerHTML = "Special Attack";
    document.getElementById("btn4").disabled = false;
    document.getElementById("btn4").innerHTML = "Special Defense";
    document.getElementById("btn5").disabled = false;
    document.getElementById("btn5").innerHTML = "Speed";
    document.getElementById("result").innerHTML = "Total BST: " + totalBST;
    loadMon();
    const best = calculateBestScore(shuffledArr.slice(0, 6));
    document.getElementById("bestScore").childNodes[0].textContent = "Best possible score: " + best.score + " ";
    best.assignment.forEach((pick, index) => {
        if (best.assignment[index].stat == "hp") {
            document.getElementById("best0").innerHTML = "<img src='images/" + pick.pokemon.name + ".png'> <br>" + statLabels[pick.stat] + ": " + pick.value;
        } else if (best.assignment[index].stat == "attack") {
            document.getElementById("best1").innerHTML = "<img src='images/" + pick.pokemon.name + ".png'> <br>" + statLabels[pick.stat] + ": " + pick.value;
        } else if (best.assignment[index].stat == "defense") {
            document.getElementById("best2").innerHTML = "<img src='images/" + pick.pokemon.name + ".png'> <br>" + statLabels[pick.stat] + ": " + pick.value;
        } else if (best.assignment[index].stat == "specialAttack") {
            document.getElementById("best3").innerHTML = "<img src='images/" + pick.pokemon.name + ".png'> <br>" + statLabels[pick.stat] + ": " + pick.value;
        } else if (best.assignment[index].stat == "specialDefense") {
            document.getElementById("best4").innerHTML = "<img src='images/" + pick.pokemon.name + ".png'> <br>" + statLabels[pick.stat] + ": " + pick.value;
        } else if (best.assignment[index].stat == "speed") {
            document.getElementById("best5").innerHTML = "<img src='images/" + pick.pokemon.name + ".png'> <br>" + statLabels[pick.stat] + ": " + pick.value;
        }
    });
}

function loadMon() {
	isShiny = false;
	var shinyRoll = Math.floor(Math.random() * shinyOdds);
    document.getElementById("pokemonName").textContent = shuffledArr[currentMon].name;
    if (shinyRoll == 0 && shuffledArr[currentMon].shiny == true) {      
      isShiny = true;
      document.getElementById("pokemonSprite").src = "images/shiny_" + shuffledArr[currentMon].name + ".png";
    } else {
      document.getElementById("pokemonSprite").src = "images/" + shuffledArr[currentMon].name + ".png";
    }
}

function submit(val) {
	var imageSrc = "<img src='images/";
	if (isShiny) {
    	imageSrc = "<img src='images/shiny_";
    } else {
    	imageSrc = "<img src='images/";
    }
    if (val == 0) {
        totalBST += shuffledArr[currentMon].stats.hp;
        document.getElementById("btn0").innerHTML = "HP: " + shuffledArr[currentMon].stats.hp;
        document.getElementById("your0").innerHTML = imageSrc + shuffledArr[currentMon].name + ".png'> <br>HP: " + shuffledArr[currentMon].stats.hp;
    } else if (val == 1) {
        totalBST += shuffledArr[currentMon].stats.attack;
        document.getElementById("btn1").innerHTML = "Attack : " + shuffledArr[currentMon].stats.attack;
        document.getElementById("your1").innerHTML = imageSrc + shuffledArr[currentMon].name + ".png'> <br>Attack: " + shuffledArr[currentMon].stats.attack;
    } else if (val == 2) {
        totalBST += shuffledArr[currentMon].stats.defense;
        document.getElementById("btn2").innerHTML = "Defense: " + shuffledArr[currentMon].stats.defense;
        document.getElementById("your2").innerHTML = imageSrc + shuffledArr[currentMon].name + ".png'> <br>Defense: " + shuffledArr[currentMon].stats.defense;
    } else if (val == 3) {
        totalBST += shuffledArr[currentMon].stats.specialAttack;
        document.getElementById("btn3").innerHTML = "Special Attack: " + shuffledArr[currentMon].stats.specialAttack;
        document.getElementById("your3").innerHTML = imageSrc + shuffledArr[currentMon].name + ".png'> <br>Special Attack: " + shuffledArr[currentMon].stats.specialAttack;
    } else if (val == 4) {
        totalBST += shuffledArr[currentMon].stats.specialDefense;
        document.getElementById("btn4").innerHTML = "Special Defense: " + shuffledArr[currentMon].stats.specialDefense;
        document.getElementById("your4").innerHTML = imageSrc + shuffledArr[currentMon].name + ".png'> <br>Special Defense: " + shuffledArr[currentMon].stats.specialDefense;
    } else if (val == 5) {
        totalBST += shuffledArr[currentMon].stats.speed;
        document.getElementById("btn5").innerHTML = "Speed: " + shuffledArr[currentMon].stats.speed;
        document.getElementById("your5").innerHTML = imageSrc + shuffledArr[currentMon].name + ".png'> <br>Speed: " + shuffledArr[currentMon].stats.speed;
    }
    document.getElementById("btn" + val).disabled = true;
    document.getElementById("result").innerHTML = "Total BST: " + totalBST;
    document.getElementById("xhp").style.opacity = "1";
    document.getElementById("xatk").style.opacity = "1";
    document.getElementById("xdef").style.opacity = "1";
    document.getElementById("xspa").style.opacity = "1";
    document.getElementById("xspd").style.opacity = "1";
    document.getElementById("xspe").style.opacity = "1";
    clearTimeout(a);
    a = setTimeout(function() {
        document.getElementById("xhp").style.opacity = "0";
        document.getElementById("xatk").style.opacity = "0";
        document.getElementById("xdef").style.opacity = "0";
        document.getElementById("xspa").style.opacity = "0";
        document.getElementById("xspd").style.opacity = "0";
        document.getElementById("xspe").style.opacity = "0";
    }, 3000);

    document.getElementById("xhp").innerHTML = shuffledArr[currentMon].stats.hp;
    document.getElementById("xatk").innerHTML = shuffledArr[currentMon].stats.attack;
    document.getElementById("xdef").innerHTML = shuffledArr[currentMon].stats.defense;
    document.getElementById("xspa").innerHTML = shuffledArr[currentMon].stats.specialAttack;
    document.getElementById("xspd").innerHTML = shuffledArr[currentMon].stats.specialDefense;
    document.getElementById("xspe").innerHTML = shuffledArr[currentMon].stats.speed;

    if (currentMon == 5) {
        document.getElementById("newGame").style.display = "inline";
        document.getElementById("scene0").style.display = "none";
        document.getElementById("scene1").style.display = "inline";
        document.getElementById("finalScore").innerHTML = "Your final score: " + totalBST;
    } else {
        currentMon++;
        loadMon();
    }
}

newGame();
</script>
</body>
</html>
