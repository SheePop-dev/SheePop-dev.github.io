<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RetroAchievement Bingo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
	  background: black;
	  color: white;
    }
    #achievement {
      margin-top: 20px;
      padding: 20px;
      border: 1px solid #ccc;
      display: inline-block;
      max-width: 400px;
    }
	#info, #reroll {
	  background-color: #888888;
	}
	.green {
	  background-color: green;
	}
	.yellow {
	  background-color: #8b8000;	
	}
	.red {
	  background-color: red;
	}
    img {
      max-width: 100px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    td {
      width: 112px;
      height: 112px;
      border: solid grey 2px;
    }
	#td0, #td1 {
	  display: none;
	}
	#optionButton0, #optionButton1 {
	  border: none;
	  background: none;
	  color: white;
	}
	#optionButton0 {
	  border-bottom: solid white 2px;
	  font-weight: bold;
	}
	.selected {
	  border: solid white 2px;
	  color: white;
	}
  </style>
</head>
<body>
  <h1>RetroAchievements Bingo</h1>
  <button id="optionButton0" onclick="bingoOption(0)">Want to play games</button>
  <button id="optionButton1" onclick="bingoOption(1)">Games by ID</button><br><br>
  <table style="margin: 0px auto;">
	<td style="padding: 8px;">RetroAchievements Username:</td> <td id="td0a" style="padding: 8px;"><input onChange="checkButton()" id="username"></input></td><tr>
	<td style="padding: 8px;">API Key:</td> <td style="padding: 8px;"><input type=password onChange="checkButton()" id="api"></input></td><tr>
	<td id="td0" style="padding: 8px;">Game IDs (comma separated):</td> <td id="td1" style="padding: 8px;"><input onChange="checkButton()" id="manualIDs"></input></td>
  </table><br><br>
  <span id="gamesNum"></span><br>
  <button id="size3" onclick="changeBingoSize(3)">3x3</button>
  <button id="size4" onclick="changeBingoSize(4)">4x4</button>
  <button id="size5" onclick="changeBingoSize(5)">5x5</button>
  <button id="generate" onclick="getWantToPlay()">Create Bingo Board</button><br><br>
  <button id="info" class="selected" onclick="changeColor('info')">Info</button>
  <button id="green" class="green" onclick="changeColor('green')">Green</button>
  <button id="yellow" class="yellow" onclick="changeColor('yellow')">Yellow</button>
  <button id="red" class="red" onclick="changeColor('red')">Red</button>
  <button id="reroll" onclick="changeColor('reroll')">reroll</button><br><br>
 
  <div id="bingo">
    <table style="margin: 0px auto;">
    <td id="0-0" onClick="clicked(0,0)"></td><td id="0-1" onClick="clicked(0,1)"></td><td id="0-2" onClick="clicked(0,2)"></td><td id="0-3" onClick="clicked(0,3)"></td><td id="0-4" onClick="clicked(0,4)"></td> <tr>
    <td id="1-0" onClick="clicked(1,0)"></td><td id="1-1" onClick="clicked(1,1)"></td><td id="1-2" onClick="clicked(1,2)"></td><td id="1-3" onClick="clicked(1,3)"></td><td id="1-4" onClick="clicked(1,4)"></td> <tr>
	<td id="2-0" onClick="clicked(2,0)"></td><td id="2-1" onClick="clicked(2,1)"></td><td id="2-2" onClick="clicked(2,2)"></td><td id="2-3" onClick="clicked(2,3)"></td><td id="2-4" onClick="clicked(2,4)"></td> <tr>
	<td id="3-0" onClick="clicked(3,0)"></td><td id="3-1" onClick="clicked(3,1)"></td><td id="3-2" onClick="clicked(3,2)"></td><td id="3-3" onClick="clicked(3,3)"></td><td id="3-4" onClick="clicked(3,4)"></td> <tr>
	<td id="4-0" onClick="clicked(4,0)"></td><td id="4-1" onClick="clicked(4,1)"></td><td id="4-2" onClick="clicked(4,2)"></td><td id="4-3" onClick="clicked(4,3)"></td><td id="4-4" onClick="clicked(4,4)"></td>
    </table>
  </div><br><br><br><br>
  
  <div id="results"></div>

  <script>
  
	const gameIDs = [];
	var tempGameIDs = [...gameIDs];
	var USERNAME = "";
    var API_KEY = "";
	
	var bingoSize = 5;
	
	document.getElementById("gamesNum").innerHTML = gameIDs.length + " games loaded";
    
    var rand1 = Math.floor(Math.random() * (gameIDs.length - 0 + 1));
    var GAME_ID = gameIDs[rand1]; 

    var i = 0;
	var j = 0;
	var k = 0;

    var highlight = "info";
	var manualIDs = false;
	
	function bingoOption(val) {
		if (val == 1) {
			manualIDs = true;
			document.getElementById("td0").style.display = "table-cell";
			document.getElementById("td1").style.display = "table-cell";
			document.getElementById("optionButton0").style.border = "none";
			document.getElementById("optionButton0").style.fontWeight = "normal";
			document.getElementById("optionButton1").style.borderBottom = "solid white 2px";
			document.getElementById("optionButton1").style.fontWeight = "bold";
		
		} else {
			manualIDs = false;
			document.getElementById("td0").style.display = "none";
			document.getElementById("td1").style.display = "none";
			document.getElementById("optionButton1").style.border = "none";
			document.getElementById("optionButton1").style.fontWeight = "normal";
			document.getElementById("optionButton0").style.borderBottom = "solid white 2px";
			document.getElementById("optionButton0").style.fontWeight = "bold";
		}
	}

	function clicked(row, column) {
		if (highlight == "reroll") {
			getRandomAchievement(row, column);
		} else if (highlight == "info") {
			alert(document.getElementById(row + "-" + column).title);
		} else { 
			document.getElementById(row + "-" + column).style.backgroundColor = highlight;
		}
	}

    function changeColor(color) {
	  document.getElementById(highlight).classList.remove("selected");
	  highlight = color;
	  document.getElementById(color).classList.add("selected");
	}
	
	function changeBingoSize(val) {
		bingoSize = val;
		if (val == 3) {
			document.getElementById("bingo").innerHTML =  '<table style="margin: 0px auto;"><td id="0-0" onClick="clicked(0,0)"></td><td id="0-1" onClick="clicked(0,1)"></td><td id="0-2" onClick="clicked(0,2)"></td> <tr><td id="1-0" onClick="clicked(1,0)"></td><td id="1-1" onClick="clicked(1,1)"></td><td id="1-2" onClick="clicked(1,2)"></td> <tr><td id="2-0" onClick="clicked(2,0)"></td><td id="2-1" onClick="clicked(2,1)"></td><td id="2-2" onClick="clicked(2,2)"></td> <tr></table>'
		} else if (val == 4) {
			document.getElementById("bingo").innerHTML =  '<table style="margin: 0px auto;"><td id="0-0" onClick="clicked(0,0)"></td><td id="0-1" onClick="clicked(0,1)"></td><td id="0-2" onClick="clicked(0,2)"></td><td id="0-3" onClick="clicked(0,3)"></td> <tr><td id="1-0" onClick="clicked(1,0)"></td><td id="1-1" onClick="clicked(1,1)"></td><td id="1-2" onClick="clicked(1,2)"></td><td id="1-3" onClick="clicked(1,3)"></td> <tr><td id="2-0" onClick="clicked(2,0)"></td><td id="2-1" onClick="clicked(2,1)"></td><td id="2-2" onClick="clicked(2,2)"></td><td id="2-3" onClick="clicked(2,3)"></td> <tr><td id="3-0" onClick="clicked(3,0)"></td><td id="3-1" onClick="clicked(3,1)"></td><td id="3-2" onClick="clicked(3,2)"></td><td id="3-3" onClick="clicked(3,3)"></td> <tr></table>'
		} else {
			document.getElementById("bingo").innerHTML =  '<table style="margin: 0px auto;"><td id="0-0" onClick="clicked(0,0)"></td><td id="0-1" onClick="clicked(0,1)"></td><td id="0-2" onClick="clicked(0,2)"></td><td id="0-3" onClick="clicked(0,3)"></td><td id="0-4" onClick="clicked(0,4)"></td> <tr><td id="1-0" onClick="clicked(1,0)"></td><td id="1-1" onClick="clicked(1,1)"></td><td id="1-2" onClick="clicked(1,2)"></td><td id="1-3" onClick="clicked(1,3)"></td><td id="1-4" onClick="clicked(1,4)"></td> <tr><td id="2-0" onClick="clicked(2,0)"></td><td id="2-1" onClick="clicked(2,1)"></td><td id="2-2" onClick="clicked(2,2)"></td><td id="2-3" onClick="clicked(2,3)"></td><td id="2-4" onClick="clicked(2,4)"></td> <tr><td id="3-0" onClick="clicked(3,0)"></td><td id="3-1" onClick="clicked(3,1)"></td><td id="3-2" onClick="clicked(3,2)"></td><td id="3-3" onClick="clicked(3,3)"></td><td id="3-4" onClick="clicked(3,4)"></td> <tr><td id="4-0" onClick="clicked(4,0)"></td><td id="4-1" onClick="clicked(4,1)"></td><td id="4-2" onClick="clicked(4,2)"></td><td id="4-3" onClick="clicked(4,3)"></td><td id="4-4" onClick="clicked(4,4)"></td></table>'
		}
		
	}
	
	async function getWantToPlay() {
		if (manualIDs) {
			USERNAME = document.getElementById("username").value;
			var username1 = document.getElementById("username").value;
			API_KEY = document.getElementById("api").value;
			var webApiKey = document.getElementById("api").value;
			
			const str0 = document.getElementById("manualIDs").value;
			arr0 = str0.split(',').map(Number);
			
			for (i = 0; i < arr0.length; i++) {
				gameIDs.push(arr0[i]);
			}
			alert(gameIDs);
			document.getElementById("gamesNum").innerHTML = gameIDs.length + " games loaded";
			getRandomAchievement();
		} else {
			USERNAME = document.getElementById("username").value;
			var username1 = document.getElementById("username").value;
			API_KEY = document.getElementById("api").value;
			var webApiKey = document.getElementById("api").value;
			try {		
				const apiUrl1 = "https://retroachievements.org/API/API_GetUserWantToPlayList.php?y=" + webApiKey + "&u=" + username1 + "&c=100&o=0";
				const url1 = apiUrl1;
				const res1 = await fetch(url1);
				const data1 = await res1.json();
				for (i = 0; i < data1.Results.length; i++) {
					gameIDs.push(data1.Results[i].ID);
				}
				document.getElementById("gamesNum").innerHTML = gameIDs.length + " games loaded";
				getRandomAchievement();
			} catch (err) {
				await delay(250); 
			}
		}
	}

	var randomized = false;
    async function getRandomAchievement(a, b) {
		document.getElementById("size3").disabled = true;
		document.getElementById("size4").disabled = true;
		document.getElementById("size5").disabled = true;
		document.getElementById("generate").disabled = true;
		if (a === undefined) {
		  if (!randomized) {
			for (i = 0; i < bingoSize; i++) {
				for (j = 0; j < bingoSize; j++) {
					await delay(250); 
					if (tempGameIDs.length < 1) {
						tempGameIDs = [...gameIDs];
					}
					rand1 = Math.floor(Math.random() * (tempGameIDs.length - 0));
					GAME_ID = tempGameIDs[rand1]; 
					tempGameIDs.splice(rand1, 1);
					try {	
						const apiUrl = `https://retroachievements.org/API/API_GetGameExtended.php?z=${USERNAME}&y=${API_KEY}&i=${GAME_ID}`;
						const url = apiUrl;
						const res = await fetch(url);
						const data = await res.json();
						const achievements = data.Achievements || [];
						if (!achievements.length) {	
							const achievementsObj = data.Achievements || {};
							const max = (data.NumAchievements);
							const rand = Math.floor(Math.random() * (max - 0));
							const keys = Object.keys(achievementsObj);
							const firstKey = keys[rand];
							const firstAchievement = achievementsObj[firstKey];
							document.getElementById(i + "-" + j).innerHTML = "<img src='https://media.retroachievements.org" + data.ImageIcon + "'>"
							document.getElementById(i + "-" + j).title = data.Title + " \u000A " + firstAchievement.Title + " \n " + firstAchievement.Description;
							document.getElementById("results").innerHTML += GAME_ID + " | " + data.Title + " | " + firstAchievement.Title + " | " + firstAchievement.Description + "<br>";
							if (j == 4) {	
								document.getElementById("results").innerHTML += "<br>";
							}
						}
						const randomAch = achievements[Math.floor(Math.random() * achievements.length)];
					} catch (err) {
					    await delay(250); 
					}
				}
			}
			randomized = true;
		  }
		} else {
			tempGameIDs = [...gameIDs];
			rand1 = Math.floor(Math.random() * (tempGameIDs.length - 0 + 1));
			GAME_ID = tempGameIDs[rand1];
			tempGameIDs.splice(rand1, 1);
			try {	
				const apiUrl = `https://retroachievements.org/API/API_GetGameExtended.php?z=${USERNAME}&y=${API_KEY}&i=${GAME_ID}`;
				const url = apiUrl;
				const res = await fetch(url);
				const data = await res.json();
				const achievements = data.Achievements || [];
				if (!achievements.length) {	
					const achievementsObj = data.Achievements || {};
					const max = (data.NumAchievements);
					const rand = Math.floor(Math.random() * (max - 0 + 1));
					const keys = Object.keys(achievementsObj);
					const firstKey = keys[rand];
					const firstAchievement = achievementsObj[firstKey];
					document.getElementById(a + "-" + b).innerHTML = "<img src='https://media.retroachievements.org" + data.ImageIcon + "'>"
					document.getElementById(a + "-" + b).title = data.Title + " | " + firstAchievement.Title + " | " + firstAchievement.Description;
					document.getElementById("results").innerHTML += GAME_ID + " | " + data.Title + " | " + firstAchievement.Title + " | " + firstAchievement.Description + "<br>";
					if (j == 4) {	
						document.getElementById("results").innerHTML += "<br>";
					}
				}
				const randomAch = achievements[Math.floor(Math.random() * achievements.length)];
			} catch (err) {
				document.getElementById("results").innerHTML += " [ " + GAME_ID + " ] ";
				console.error("ERROR:", err);
			}
		}
	}
	
	function delay(ms) {
		return new Promise(resolve => setTimeout(resolve, ms));
	}
  </script>

</body>
</html>
